<svg id="mainSvg" width="780" height="360" viewBox="0 0 780 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
  <style>
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes cursor{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes scanline{0%{transform:translateY(-10px)}100%{transform:translateY(370px)}}
    @keyframes typing{from{opacity:0}to{opacity:1}}
    .f1{animation:fadeUp .4s .05s both}.f2{animation:fadeUp .4s .2s both}.f3{animation:fadeUp .4s .35s both}
    .f4{animation:fadeUp .4s .5s both}.f5{animation:fadeUp .4s .65s both}.f6{animation:fadeUp .4s .8s both}
    .f7{animation:fadeUp .4s .95s both}.f8{animation:fadeUp .4s 1.1s both}.f9{animation:fadeUp .4s 1.25s both}
    .f10{animation:fadeUp .4s 1.4s both}.f11{animation:fadeUp .4s 1.55s both}.f12{animation:fadeUp .4s 1.7s both}
    .cur{animation:cursor 1s infinite}
    .scan{animation:scanline 6s linear infinite;opacity:.025}
  </style>
  <clipPath id="avatarClip">
    <circle cx="82" cy="82" r="52"></circle>
  </clipPath>
</defs>

